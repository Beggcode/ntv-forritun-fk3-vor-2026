name: CI

on:
  push:
    branches: [main, verkefni-8]
  pull_request:
  
env:
  PROJECT: "lesson8"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PROJECT }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PROJECT }}

      - name: Run Lint
        run: npm run lint
        working-directory: ${{ env.PROJECT }}

      - name: Run Tests 
        run: npm test
        working-directory: ${{ env.PROJECT }}

      - name: Deploy to Railway 
        run: npx @railway/cli up --detach
        working-directory: ${{ env.PROJECT }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
